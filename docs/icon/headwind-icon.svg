<?xml version="1.0" encoding="UTF-8"?>
<!-- Headwind app icon master (1024x1024, full bleed; iOS applies the squircle mask). -->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.22" y2="1">
      <stop offset="0" stop-color="#5BC4F5"/>
      <stop offset="0.52" stop-color="#2E7BE5"/>
      <stop offset="1" stop-color="#1D3F9E"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#sky)"/>

  <!-- Headwind streams meeting the nose -->
  <g stroke="#FFFFFF" stroke-width="30" stroke-linecap="round" fill="none">
    <line x1="650" y1="222" x2="908" y2="222" stroke-opacity="0.22"/>
    <line x1="790" y1="314" x2="952" y2="314" stroke-opacity="0.38"/>
    <line x1="728" y1="406" x2="884" y2="406" stroke-opacity="0.15"/>
  </g>

  <!-- Paper dart, climbing 45 degrees -->
  <g transform="translate(510, 540) rotate(-45)">
    <!-- soft offset shadow -->
    <g transform="translate(8, 20)" fill="#0E2A63" fill-opacity="0.22">
      <polygon points="320,0 -220,-170 -120,0 -220,170"/>
    </g>
    <!-- upper fold -->
    <polygon points="320,0 -220,-170 -120,0" fill="#FFFFFF"/>
    <!-- lower fold, shaded for depth -->
    <polygon points="320,0 -120,0 -220,170" fill="#C9DFF9"/>
  </g>
</svg>
