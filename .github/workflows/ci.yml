name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  core-tests:
    name: HeadwindCore tests (Linux)
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: swift test --package-path Packages/HeadwindCore
