name: Build & Screenshots

on:
  workflow_dispatch:
  push:
    branches: ["claude/headwind-aviation-app-eiapz2"]
    paths-ignore:
      - "docs/screenshots/**"

permissions:
  contents: write

concurrency:
  group: screenshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-capture:
    name: Build app & capture simulator screenshots
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version
          xcrun simctl list runtimes

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project Headwind.xcodeproj \
            -scheme Headwind \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Capture screenshots
        run: bash scripts/capture-screenshots.sh

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: docs/screenshots

      - name: Commit screenshots to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
            exit 0
          fi
          git commit -m "Add iOS simulator screenshots [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
